<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Stack Pages</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 0.3em; }
    .hero p { font-size: 1.2rem; color: var(--gray); margin-bottom: 2rem; }
    .page-list {
      max-width: 600px;
      margin: 0 auto;
      list-style: none;
    }
    .page-list li {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-bottom: 12px;
    }
    .page-list a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .page-list a:hover { color: var(--primary-light); }
    .page-list .desc { color: var(--gray); font-size: 0.9rem; margin-top: 4px; }
    .empty-hint { color: var(--gray); font-style: italic; }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <h1>Vibe Stack Pages</h1>
      <p>对外分享的 Web 页面合集</p>
    </div>

    <section>
      <div class="container">
        <h2 class="text-center" style="margin-bottom: 1.5rem;">页面列表</h2>
        <ul class="page-list">
          <li>
            <a href="course/vibe-coding-intro.html">Vibe Coding 入门课</a>
            <div class="desc">4 周课程大纲 · 零基础到小程序上线</div>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="container text-center text-gray" style="padding: 40px 0;">
    <p>&copy; 2026 Vibe Coding 课程</p>
  </footer>
</body>
</html>
